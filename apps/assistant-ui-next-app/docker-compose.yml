services:
  postgres:
    image: postgres:16-alpine
    container_name: assistant-ui-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: assistant
      POSTGRES_DB: assistant_ui
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
